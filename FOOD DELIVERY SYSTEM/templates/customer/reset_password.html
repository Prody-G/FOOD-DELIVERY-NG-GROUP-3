<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Password — Unifood</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="auth-wrap"> <div class="auth-card"> <div class="auth-logo"> <div class="logo-icon"></div> <h1>Reset Password</h1> <p>Enter your new password below.</p> </div> {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %} <div class="flash flash-{{ 'success' if cat == 'success' else 'error' }}" style="margin-bottom:1rem;">{{ msg }}</div> {% endfor %}
    {% endwith %} <form method="POST"> <div class="form-group"> <label>New Password *</label> <input type="password" name="password" required placeholder="Min 8 characters"> </div> <div class="form-group"> <label>Confirm New Password *</label> <input type="password" name="confirm_password" required placeholder="Repeat password"> </div> <button type="submit" class="btn btn-primary btn-full btn-lg">Reset Password</button> </form> </div>
</div>
</body>
</html>
