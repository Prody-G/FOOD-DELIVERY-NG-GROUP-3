<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign In — Unifood</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Welcome Back</h1>
      <p>Sign in to your Unifood account</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash flash-{{ 'success' if cat == 'success' else 'error' }}" style="margin-bottom:1rem;">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:.5rem;">Sign In</button>
    </form>

    <div class="auth-divider">or</div>
    <div class="auth-links">
      New here? <a href="{{ url_for('customer.register') }}">Create an account</a>
      &nbsp;|&nbsp;
      <a href="{{ url_for('customer.forgot_password') }}">Forgot Password?</a>
    </div>

    <div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid #f3f4f6;text-align:center;font-size:.82rem;color:#9ca3af;">
      Are you a vendor?
      <a href="{{ url_for('vendor.login') }}" style="color:#22c55e;">Vendor Login</a>
      &nbsp;|&nbsp;
      <a href="{{ url_for('rider.login') }}" style="color:#22c55e;">Rider Login</a>
    </div>
  </div>
</div>
</body>
</html>
