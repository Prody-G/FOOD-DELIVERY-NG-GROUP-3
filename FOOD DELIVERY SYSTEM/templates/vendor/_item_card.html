<div class="item-card"> {% if item.image %} <img src="{{ url_for('static', filename=item.image) }}" class="item-card-img" alt="{{ item.name }}"> {% else %} <div class="item-card-img" style="display:flex;align-items:center;justify-content:center;
       background:linear-gradient(135deg,#dcfce7,#bbf7d0);font-size:2.5rem;"></div> {% endif %} <div class="item-card-body"> <div class="item-card-name">{{ item.name }}</div> {% if item.description %} <div style="font-size:.78rem;color:#6b7280;margin-top:.2rem;">{{ item.description[:60] }}{% if item.description|length > 60 %}...{% endif %}</div> {% endif %} <div class="item-card-price">₱{{ '%.2f'|format(item.price) }}</div> <div style="margin-top:.4rem;"> <span class="badge {% if item.is_available %}badge-success{% else %}badge-danger{% endif %}"> {{ 'Available' if item.is_available else 'Unavailable' }} </span> </div> <div class="item-card-actions"> <a href="{{ url_for('vendor.item_edit', item_id=item.id) }}" class="btn btn-info btn-sm"> Edit</a> <form method="POST" action="{{ url_for('vendor.item_toggle', item_id=item.id) }}"> <button class="btn btn-warning btn-sm" title="Toggle availability"> {{ '⏸' if item.is_available else '' }} </button> </form> <form method="POST" action="{{ url_for('vendor.item_delete', item_id=item.id) }}"
            onsubmit="return confirm('Delete this item?')"> <button class="btn btn-danger btn-sm"></button> </form> </div> </div>
</div>
