{% extends 'admin/base.html' %}
{% block title %}Add Rider{% endblock %}
{% block page_title %}Add Rider{% endblock %}
{% block content %}
<div class="page-header"> <h2> Add New Rider</h2>
</div>
<div class="card" style="max-width:600px;"> <form method="POST"> <div class="form-row"> <div class="form-group"> <label>Full Name *</label> <input type="text" name="name" required placeholder="Juan Dela Cruz"> </div> <div class="form-group"> <label>Email *</label> <input type="email" name="email" required placeholder="rider@email.com"> </div> </div> <div class="form-row"> <div class="form-group"> <label>Phone Number</label> <input type="text" name="phone" placeholder="09XXXXXXXXX"> </div> <div class="form-group"> <label>Vehicle Type</label> <select name="vehicle_type"> <option value="">-- Select --</option> <option value="Walker">Walker</option> <option value="Motorcycle">Motorcycle</option> <option value="Vehicle">Vehicle</option> <option value="Bicycle">Bicycle</option> </select> </div> </div> <div class="form-group"> <label>License Number</label> <input type="text" name="license_number" placeholder="License plate / ID number"> </div> <div class="form-row"> <div class="form-group"> <label>Password *</label> <input type="password" name="password" required placeholder="Set initial password"> </div> <div class="form-group"> <label>Confirm Password *</label> <input type="password" name="confirm_password" required> </div> </div> <div class="flex gap-1"> <button type="submit" class="btn btn-primary">Save Rider</button> <a href="{{ url_for('admin.riders') }}" class="btn btn-outline">Cancel</a> </div> </form>
</div>
{% endblock %}
