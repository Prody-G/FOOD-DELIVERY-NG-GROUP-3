<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Login — Unifood</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="auth-wrap"> <div class="auth-card"> <div class="auth-logo"> <div class="logo-icon"></div> <h1>Unifood</h1> <p>Admin Portal</p> </div> {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %} <div class="flash flash-{{ 'success' if cat == 'success' else 'error' }}" style="margin-bottom:1rem;">{{ msg }}</div> {% endfor %}
    {% endwith %} <form method="POST"> <div class="form-group"> <label>Email Address</label> <input type="email" name="email" placeholder="admin@example.com" required> </div> <div class="form-group"> <label>Password</label> <input type="password" name="password" placeholder="••••••••" required> </div> <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:.5rem;"> Sign In </button> </form> <div class="auth-links"> <p style="margin-top:1rem;font-size:.8rem;color:#9ca3af;"> Default: admin@fooddelivery.com / admin123 </p> </div> </div>
</div>
</body>
</html>
