{% extends 'admin/base.html' %}
{% block title %}Edit Customer{% endblock %}
{% block page_title %}Edit Customer{% endblock %}
{% block content %}
<div class="page-header"> <h2> Edit Customer — {{ customer.name }}</h2>
</div>
<div class="card" style="max-width:640px;"> <form method="POST"> <div class="form-row"> <div class="form-group"> <label>Full Name *</label> <input type="text" name="name" value="{{ customer.name }}" required> </div> <div class="form-group"> <label>Email *</label> <input type="email" name="email" value="{{ customer.email }}" required> </div> </div> <div class="form-row"> <div class="form-group"> <label>Phone</label> <input type="text" name="phone" value="{{ customer.phone or '' }}" pattern="^09\d{9}$" maxlength="11" title="Please enter a valid 11-digit Philippine mobile number starting with 09"> </div> <div class="form-group"> <label>Status</label> <select name="status"> {% for s in ['active','suspended','banned'] %} <option {% if customer.status == s %}selected{% endif %} value="{{ s }}">{{ s.title() }}</option> {% endfor %} </select> </div> </div> <div class="form-group"> <label>Street Address</label> <input type="text" name="address" value="{{ customer.address or '' }}"> </div> <div class="form-row"> <div class="form-group"> <label>Region</label> <input type="text" name="region" value="{{ customer.region or '' }}"> </div> <div class="form-group"> <label>Province</label> <input type="text" name="province" value="{{ customer.province or '' }}"> </div> </div> <div class="form-row"> <div class="form-group"> <label>City / Municipality</label> <input type="text" name="city" value="{{ customer.city or '' }}"> </div> <div class="form-group"> <label>Barangay</label> <input type="text" name="barangay" value="{{ customer.barangay or '' }}"> </div> </div> <div class="form-group"> <label>New Password (leave blank to keep current)</label> <input type="password" name="password" placeholder="Leave blank to keep unchanged"> </div> <div class="flex gap-1"> <button type="submit" class="btn btn-primary">Update Customer</button> <a href="{{ url_for('admin.customers') }}" class="btn btn-outline">Cancel</a> </div> </form>
</div>
{% endblock %}
